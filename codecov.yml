# Codecov configuration
# https://docs.codecov.com/docs/codecovyml-reference

coverage:
  status:
    # Overall project coverage check
    project:
      default:
        # Don't fail the check based on absolute coverage
        # Just report the coverage level
        informational: true
    # Per-PR coverage change check
    patch:
      default:
        # Require new code in PRs to have some coverage
        # Set to informational initially while building coverage
        informational: true

# Flag management.
# - unit: uploaded on every PR/push by the Tests CI workflow.
# - e2e:  uploaded only by the opt-in "Combined Coverage" workflow.
#         carryforward reuses the most recent e2e report on commits where it
#         isn't uploaded, so the combined number/badge doesn't drop back to
#         unit-only between e2e runs. (Re-run / schedule that workflow to keep
#         the e2e portion fresh.)
flag_management:
  individual_flags:
    - name: unit
      carryforward: false
    - name: e2e
      carryforward: true

# Comment settings for PR coverage reports
comment:
  layout: "reach,diff,flags,files"
  behavior: default
  require_changes: false
  require_base: false
  require_head: true

# Ignore these paths in coverage calculations
ignore:
  - "**/*.spec.ts"
  - "**/*.test.ts"
  - "tests/**"
  - ".nuxt/**"
  - "node_modules/**"
  - "coverage/**"
  - "**/*.d.ts"
