# Docker Compose for Playwright stateful tests
#
# This file runs ONLY Neo4j with a known test password.
# Playwright starts the backend (with mock-auth) and frontend itself.
#
# Usage:
#   docker compose -f docker-compose.playwright.yml up -d
#   npm run test:playwright:stateful
#   docker compose -f docker-compose.playwright.yml down -v
#
# The -v flag removes the ephemeral volume so each run starts fresh.

services:
  neo4j-playwright:
    image: neo4j:5.1.0
    container_name: neo4j-playwright
    ports:
      - '7688:7687'  # Bolt on 7688 to avoid conflict with dev Neo4j on 7687
      - '7475:7474'  # Browser UI on different port to avoid conflict with dev Neo4j
    environment:
      - NEO4J_AUTH=neo4j/playwright-ci-password
      - NEO4J_PLUGINS=["apoc"]
      - NEO4J_dbms_security_procedures_unrestricted=apoc.*
      - NEO4J_dbms_default__database=neo4j
      - NEO4J_dbms_logs_debug_level=INFO
      - NEO4J_dbms_logs_query_enabled=OFF
      - NEO4J_dbms_memory_pagecache_size=512M
      - NEO4J_dbms_memory_heap_initial__size=512M
      - NEO4J_dbms_memory_heap_max__size=1G
    volumes:
      - neo4j-playwright-data:/data
    healthcheck:
      test:
        [
          'CMD',
          'cypher-shell',
          '-u',
          'neo4j',
          '-p',
          'playwright-ci-password',
          'RETURN 1',
        ]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s

volumes:
  neo4j-playwright-data:
